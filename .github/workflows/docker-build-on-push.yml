name: Docker Build & Push on Main

# 每当 main 分支有新 commit 时触发构建并推送镜像
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-build-on-push-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔡 Set lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT


      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 使用 GITHUB_TOKEN 自动密钥登录到 GHCR，无需额外配置
      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 生成镜像 tag：latest + 短 SHA
      - name: 🏷️ Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # 构建并推送多架构镜像到 GHCR
      - name: 🐳 Build and push multi-arch images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📋 Summary
        run: |
          echo "### 🎉 Docker Images Built & Pushed" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** \`push\` to \`main\` (commit: \`${{ github.sha }}\`)" >> $GITHUB_STEP_SUMMARY
          echo "**GHCR Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # -------------------------------------------------------
  # 部署：通过 SSH Key pair 连接远程 Docker daemon，pull 镜像并重启容器
  # 需要在仓库 Secrets / Variables 中配置：
  #   DEPLOY_SSH_HOST  - 远程服务器 IP 或域名
  #   DEPLOY_SSH_USER  - SSH 用户名，如 ubuntu / root
  #   DEPLOY_SSH_KEY   - SSH 私钥完整内容（OpenSSH 格式）
  #   DEPLOY_SSH_PORT  - SSH 端口（可选，默认 22）
  #   以及所有 .env 中的变量，如 GEMINI_API_KEY、STOCK_LIST 等
  # -------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: 🔡 Set lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 📥 Checkout（获取 docker-compose.yml）
        uses: actions/checkout@v4

      - name: 🔑 Configure SSH key
        run: |
          SSH_PORT="${{ secrets.DEPLOY_SSH_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          # 直接用 echo 写入，GitHub Actions 会保留原始内容（含换行）
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # 验证私钥格式是否正确
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null && echo "✅ 私钥格式正确" || (echo "❌ 私钥格式错误" && exit 1)
          ssh-keyscan -p "${SSH_PORT}" "${{ vars.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 🔌 Test SSH connection
        run: |
          SSH_PORT="${{ secrets.DEPLOY_SSH_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              -p "${SSH_PORT}" \
              ${{ vars.DEPLOY_SSH_USER }}@${{ vars.DEPLOY_SSH_HOST }} \
              "echo '✅ SSH 连接成功，主机: $(hostname)'"

      - name: 📝 Prepare .env file
        env:
          # vars 整体注入：GitHub Actions 会将所有 Variables 展开到环境变量
          # 新增 Variable 无需改此文件，只需在 GitHub Variables 中添加即可
          #
          # secrets 必须逐个显式引用（GitHub Actions 安全限制），
          # 用 JSON 格式打包成一个字符串，bash 里统一解析
          ALL_SECRETS: |
            TUSHARE_TOKEN=${{ secrets.TUSHARE_TOKEN }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            AIHUBMIX_KEY=${{ secrets.AIHUBMIX_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            TAVILY_API_KEYS=${{ secrets.TAVILY_API_KEYS }}
            SERPAPI_API_KEYS=${{ secrets.SERPAPI_API_KEYS }}
            BRAVE_API_KEYS=${{ secrets.BRAVE_API_KEYS }}
            WECHAT_WEBHOOK_URL=${{ secrets.WECHAT_WEBHOOK_URL }}
            FEISHU_WEBHOOK_URL=${{ secrets.FEISHU_WEBHOOK_URL }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}
            EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
            EMAIL_RECEIVERS=${{ secrets.EMAIL_RECEIVERS }}
            DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}
            DISCORD_MAIN_CHANNEL_ID=${{ secrets.DISCORD_MAIN_CHANNEL_ID }}
            DINGTALK_APP_KEY=${{ secrets.DINGTALK_APP_KEY }}
            DINGTALK_APP_SECRET=${{ secrets.DINGTALK_APP_SECRET }}
            CUSTOM_WEBHOOK_URLS=${{ secrets.CUSTOM_WEBHOOK_URLS }}
            PUSHOVER_USER_KEY=${{ secrets.PUSHOVER_USER_KEY }}
            PUSHOVER_API_TOKEN=${{ secrets.PUSHOVER_API_TOKEN }}
            PUSHPLUS_TOKEN=${{ secrets.PUSHPLUS_TOKEN }}
            SERVERCHAN3_SENDKEY=${{ secrets.SERVERCHAN3_SENDKEY }}
            FEISHU_APP_ID=${{ secrets.FEISHU_APP_ID }}
            FEISHU_APP_SECRET=${{ secrets.FEISHU_APP_SECRET }}
            STOCK_LIST=${{ secrets.STOCK_LIST }}
            LLM_ARK_API_KEY=${{ secrets.LLM_ARK_API_KEY }}
        run: |
          # 第一步：从 .env.example 提取所有变量名和默认值作为基础
          grep -E '^[A-Z_]+=.*' .env.example | grep -v '^#' > /tmp/deploy.env || true

          # 第二步：以 .env.example 中的变量名为基准
          # 从当前环境变量（即 GitHub Variables）中查找同名变量并覆盖
          while IFS= read -r line; do
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            key="${line%%=*}"
            # 查找同名环境变量（来自 vars.*）
            env_val="${!key}"
            if [[ -n "$env_val" ]]; then
              sed -i "/^${key}=/d" /tmp/deploy.env
              echo "${key}=${env_val}" >> /tmp/deploy.env
            fi
          done < .env.example

          # 第三步：解析 ALL_SECRETS，secrets 优先级最高，非空则覆盖
          while IFS='=' read -r key val; do
            [[ -z "$key" || -z "$val" ]] && continue
            key="${key// /}"  # 去除空格
            sed -i "/^${key}=/d" /tmp/deploy.env
            echo "${key}=${val}" >> /tmp/deploy.env
          done <<< "$ALL_SECRETS"

          # 第四步：写入 Docker 部署固定值（始终覆盖）
          for fixed in \
            "DATABASE_PATH=./data/stock_analysis.db" \
            "LOG_DIR=./logs" \
            "WEBUI_HOST=0.0.0.0"; do
            key="${fixed%%=*}"
            sed -i "/^${key}=/d" /tmp/deploy.env
            echo "$fixed" >> /tmp/deploy.env
          done

          echo "✅ 最终 .env 变量列表（值已隐藏）："
          grep -E '^[A-Z_]+=' /tmp/deploy.env | sed 's/=.*/=***/' | sort

      - name: 🔐 Log in to GHCR on remote Docker host
        run: |
          SSH_PORT="${{ secrets.DEPLOY_SSH_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            ssh -i ~/.ssh/deploy_key \
                -o StrictHostKeyChecking=no \
                -p "${SSH_PORT}" \
                ${{ vars.DEPLOY_SSH_USER }}@${{ vars.DEPLOY_SSH_HOST }} \
                "docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: 📦 Copy compose file & .env to remote server
        run: |
          SSH_PORT="${{ secrets.DEPLOY_SSH_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          # 把 docker-compose.deploy.yml 和 .env 复制到远程服务器
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -P "${SSH_PORT}" \
              ./docker/docker-compose.deploy.yml \
              /tmp/deploy.env \
              ${{ vars.DEPLOY_SSH_USER }}@${{ vars.DEPLOY_SSH_HOST }}:/tmp/

      - name: 📦 Pull latest image & restart containers
        run: |
          SSH_PORT="${{ secrets.DEPLOY_SSH_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          DEPLOY_IMAGE="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest"
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -p "${SSH_PORT}" \
              ${{ vars.DEPLOY_SSH_USER }}@${{ vars.DEPLOY_SSH_HOST }} \
              DEPLOY_IMAGE="${DEPLOY_IMAGE}" \
              bash -s << 'SSHEOF'
          set -e

          echo "📦 拉取最新镜像并重启容器: ${DEPLOY_IMAGE}"
          DEPLOY_IMAGE="${DEPLOY_IMAGE}" docker compose \
            -f /tmp/docker-compose.deploy.yml \
            --env-file /tmp/deploy.env \
            up -d --pull always server analyzer

          echo "🧹 清理旧镜像..."
          docker image prune -f

          echo "✅ 部署完成！运行状态："
          DEPLOY_IMAGE="${DEPLOY_IMAGE}" docker compose \
            -f /tmp/docker-compose.deploy.yml \
            --env-file /tmp/deploy.env \
            ps

          echo "🧹 清理临时文件..."
          rm -f /tmp/docker-compose.deploy.yml /tmp/deploy.env
          SSHEOF

      - name: 🔒 Clean up
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key /tmp/deploy.env

      - name: 📋 Deploy Summary
        run: |
          echo "### 🚀 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "**服务器:** \`${{ vars.DEPLOY_SSH_USER }}@${{ vars.DEPLOY_SSH_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**镜像:** \`${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
